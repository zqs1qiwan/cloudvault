<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <title>404 — Page Not Found</title>
  <script>try{var _b=JSON.parse(document.getElementById('branding-data')?.textContent||'{}');if(_b.siteName)document.title='404 — '+_b.siteName}catch{}</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            accent: { 50:'#e0fbff',100:'#b3f5ff',200:'#80eeff',300:'#4de7ff',400:'#00E5FF',500:'#00E5FF',600:'#00b8cc',700:'#008a99',800:'#005d66',900:'#002f33' },
            warm: '#FFB800'
          },
          fontFamily: {
            mono: ["'JetBrains Mono'", "'Noto Sans SC'", 'monospace'],
            sans: ["'Outfit'", "'Noto Sans SC'", '-apple-system', 'sans-serif']
          },
          borderRadius: { sm: '4px', DEFAULT: '6px', md: '8px', lg: '10px', xl: '12px' }
        }
      }
    }
    }
  </script>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body style="font-family:var(--font-body)" class="min-h-screen flex flex-col">
<div class="glow-orbs"></div>

  <header class="border-b border-[var(--border)] px-4 py-3">
    <div class="max-w-5xl mx-auto flex items-center gap-2">
      <a href="/" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
        <div id="brand-icon" class="w-7 h-7 rounded-lg flex items-center justify-center bg-transparent border border-accent-400/20">
          <svg class="w-4 h-4 text-accent-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15a4.5 4.5 0 004.5 4.5H18a3.75 3.75 0 001.332-7.257 3 3 0 00-3.758-3.848 5.25 5.25 0 00-10.233 2.33A4.502 4.502 0 002.25 15z"/></svg>
        </div>
        <span id="brand-name" class="font-semibold text-sm text-[var(--text-primary)]">CloudVault</span>
      </a>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-4">
    <div class="text-center">
      <p class="text-7xl font-bold text-[var(--text-secondary)] mb-2">404</p>
      <p class="text-lg font-medium text-[var(--text-secondary)] mb-1">Page not found</p>
      <p class="text-sm text-[var(--text-muted)] mb-8">The page you're looking for doesn't exist or has been moved.</p>
      <a href="/" class="inline-flex items-center gap-2 px-5 py-2.5 rounded-md bg-transparent border border-accent-400 text-accent-400 hover:bg-accent-400/10 hover:shadow-[0_0_20px_rgba(0,229,255,0.15)] text-sm font-medium transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>
        Back to Home
      </a>
    </div>
  </main>

  <footer class="text-center py-4 text-xs text-[var(--text-muted)]">Powered by <a href="https://github.com/zqs1qiwan/cloudvault" target="_blank" rel="noopener" class="hover:text-[var(--text-secondary)] underline">zqs1qiwan/CloudVault</a></footer>

  <script>
    (function() {
      try {
        var b = JSON.parse(document.getElementById('branding-data')?.textContent || '{}');
        if (b.siteName) document.getElementById('brand-name').textContent = b.siteName;
        if (b.siteIconUrl) {
          var iconEl = document.getElementById('brand-icon');
          iconEl.innerHTML = '<img src="' + b.siteIconUrl + '" class="w-full h-full object-contain" onerror="this.parentElement.innerHTML=\'<svg class=\\\'w-4 h-4 text-accent-400\\\' fill=\\\'none\\\' viewBox=\\\'0 0 24 24\\\' stroke=\\\'currentColor\\\' stroke-width=\\\'2\\\'><path stroke-linecap=\\\'round\\\' stroke-linejoin=\\\'round\\\' d=\\\'M2.25 15a4.5 4.5 0 004.5 4.5H18a3.75 3.75 0 001.332-7.257 3 3 0 00-3.758-3.848 5.25 5.25 0 00-10.233 2.33A4.502 4.502 0 002.25 15z\\\'/></svg>\'">';
          iconEl.classList.add('overflow-hidden');
        }
      } catch {}
    })();
  </script>
</body>
</html>
